syntax = "proto3";

package isaac;

import "isaac/common.proto";

option go_package = "github.com/isaac/grpc-go/isaac";
option java_multiple_files = true;
option java_package = "bot.isaac.proto";

// StackService provides methods for monitoring and controlling the local stack
// (LiteLLM proxy, Jina router, MCP servers, plugins).
service StackService {
  // Get a full snapshot of the current stack state
  rpc getStackSnapshot(EmptyRequest) returns (StackSnapshot);
  // Start the local stack (proxy + router)
  rpc startStack(EmptyRequest) returns (StackActionResult);
  // Stop the local stack
  rpc stopStack(EmptyRequest) returns (StackActionResult);
  // Restart the local stack
  rpc restartStack(EmptyRequest) returns (StackActionResult);
  // Enable or disable the local stack setting
  rpc setUseLocalStack(BooleanRequest) returns (Empty);
  // Update the list of enabled MCP server IDs
  rpc setEnabledMcpServers(StringArrayRequest) returns (Empty);
  // Update MCP tool denylist
  rpc setMcpToolDenylist(StringArrayRequest) returns (Empty);
  // Update MCP tool allowlist
  rpc setMcpToolAllowlist(StringArrayRequest) returns (Empty);
  // Update Jina router routes config
  rpc updateJinaRoutes(UpdateJinaRoutesRequest) returns (Empty);
}

// Status of proxy or router process
message ProcessStatus {
  bool running = 1;
  optional string url = 2;
  optional int32 pid = 3;
  optional int64 uptime_ms = 4;
}

// A single model available on the LiteLLM proxy
message StackModel {
  string name = 1;
  bool reachable = 2;
}

// Route configuration for one Jina router category
message JinaRoute {
  string category = 1;
  repeated string examples = 2;
  string preferred_model = 3;
}

// Info about one MCP server
message McpServerInfo {
  string id = 1;
  string name = 2;
  bool enabled = 3;
  int32 tool_count = 4;
  repeated string tool_names = 5;
}

// Info about one plugin (Claude Code plugin)
message StackPluginInfo {
  string name = 1;
  string path = 2;
  int32 skills_count = 3;
  int32 commands_count = 4;
  int32 agents_count = 5;
  int32 hooks_count = 6;
}

// Full snapshot of the stack
message StackSnapshot {
  ProcessStatus proxy = 1;
  ProcessStatus router = 2;
  bool use_local_stack = 3;
  repeated StackModel models = 4;
  repeated JinaRoute routes = 5;
  repeated McpServerInfo mcp_servers = 6;
  repeated StackPluginInfo plugins = 7;
  repeated string proxy_logs = 8;
  repeated string router_logs = 9;
}

// Result of a stack start/stop/restart action
message StackActionResult {
  bool ok = 1;
  string message = 2;
  optional ProcessStatus proxy = 3;
  optional ProcessStatus router = 4;
}

// Request to update Jina router routes
message UpdateJinaRoutesRequest {
  repeated JinaRoute routes = 1;
}
