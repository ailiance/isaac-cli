name: CI

on:
  push:
    branches:
      - master
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only reads the repository.
permissions:
  contents: read

jobs:
  build:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # --ignore-scripts: the `cli` workspace has a `prepare` script that
      # builds (and typechecks) on install, which fails before protos are
      # generated. Install deps only, then generate protos, then build.
      - name: Install dependencies
        run: npm install --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # grpc-tools postinstall is skipped above; provide a system protoc
      # for build-proto.mjs to fall back to.
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      # `check-types` runs `npm run protos` itself before the tsc passes.
      - name: Check types
        run: npm run check-types

      - name: Lint
        run: npm run lint

  test:
    name: Unit Tests (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Generate Protocol Buffers
        run: npm run protos

      # The mocha unit suite is currently fragile in CI (ts-node ESM +
      # VS Code shims). It runs non-blocking so it surfaces failures as a
      # signal without gating merges; hardening it is tracked separately.
      - name: Run unit tests
        run: npm run test:unit
        continue-on-error: true
